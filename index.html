<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="logo">
            <img src="resources/logo.png.png" alt="imagem da">
            <h1>FinControl</h1>
        </div>
        <div id="header-text">
            <h1>SEJA BEM VINDO AO FINCONTROL!</h1>
            <p>Organize Sua Vida Financeira Conosco!</p>
        </div>
    </header>
    <main id="conteudo">
        <section id="saldos-principais">
            <div id="container-saldos">
                <div id="saldo-principal">
                    <p>Saldo Atual</p>
                    <h1 id="saldo-atual">R$ 0.00</h1>
                </div>
                <div id="saldos">
                    <div id="entrada">
                        <div id="seta-up">
                            <p>↗</p>
                        </div>
                        <div id="entradas">
                            <p>Entradas</p>
                            <h2>R$ 0.00</h2>
                        </div>
                    </div>
                        <div id="saida">
                        <div id="seta-down">
                            <p>↘</p>
                        </div>
                        <div id="saidas">
                            <p>Saidas</p>
                            <h2>R$ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
<script></script>
</html>
