<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="logo">
            <img src="resources/logo.png.png" alt="imagem da">
            <h1>FinControl</h1>
        </div>
        <div id="header-text">
            <h1>SEJA BEM VINDO AO FINCONTROL!</h1>
            <p>Organize Sua Vida Financeira Conosco!</p>
        </div>
    </header>
    <main id="conteudo">
        <section id="saldos-principais">
            <div id="container-saldos">
                <div id="saldo-principal">
                    <p>Saldo Atual</p>
                    <h1 id="saldo-atual">R$ 0.00</h1>
                </div>
                <div id="saldos">
                    <div id="entrada">
                        <div id="seta-up">
                            <i data-lucide="arrow-up-right"></i>
                        </div>
                        <div id="entradas">
                            <p>Entradas</p>
                            <h2 id="saldo-entradas">R$ 0.00</h2>
                        </div>
                    </div>
                        <div id="saida">
                        <div id="seta-down">
                            <i data-lucide="arrow-down-right"></i>
                        </div>
                        <div id="saidas">
                            <p>Saidas</p>
                            <h3 id="saldo-saidas">R$ 0.00</h3>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section id="transicoes">
            <div id="container-transacoes">
                <h1>Adicionar Transação</h1>
                <div id="cards-transicoes">
                    <input type="text" name="descriçoes" id="input-descricao" placeholder="Descrição">
                    <input type="text" name="valor" id="input-valor" placeholder="Digite o Valor">
                    <button id="btn-entrada" class="btns"><span>+</span> Entrada</button>
                    <button id="btn-saida" class="btns"><span>-</span> Saída</button>
                </div>
            </div>
        </section>
        <section id="historico">
            <div id="container-historico">
                <h1>Historico de Transações</h1>
                <ul id="lista-transacoes"></ul>
            </div>
        </section>
    </main>
</body>
<script src="https://unpkg.com/lucide@latest"></script>

<script>lucide.createIcons();</script>
<script src="script.js"></script>
</html>
